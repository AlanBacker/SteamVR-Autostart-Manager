name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          choco install innosetup --no-progress -y

      - name: Build portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          python build_tools/create_icon.py
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name SteamVR-Autostart-Manager `
            --icon assets/app_icon.ico `
            --version-file build_tools/version_info.txt `
            steamvr_autostart_manager.py

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          & $iscc installer\SteamVR-Autostart-Manager.iss

      - name: Write release notes
        shell: pwsh
        run: |
          @'
          # SteamVR Autostart Manager v1.0.2

          [English] | [简体中文] | [日本語] | [한국어]

          ---

          ## 🌐 English

          ### Features
          - Intuitive GUI to manage `.vrmanifest` registration and toggle autostart.
          - Supports English, Chinese Simplified, Japanese, and Korean.
          - Supports Light, Dark, and System theme modes.
          - Includes backup management to easily create and restore configuration files.
          - Adds a Steam URL entry mode for Steam games such as `steam://launch/<AppID>/VR`.
          - Improves manually added EXE autostart reliability with a lightweight launcher bridge.
          - Adds optional administrator launch support for programs that require elevation.

          ### Downloads
          - **Portable Version**: `SteamVR-Autostart-Manager.exe` (run directly)
          - **Installer Version**: `SteamVR-Autostart-Manager-Setup.exe` (install to system)

          ### License
          - This project is licensed under the MIT License.

          ---

          ## 🇨🇳 简体中文

          ### 主要功能
          - 直观的 GUI 界面，轻松管理 `.vrmanifest` 注册与自启动开关。
          - 支持英文、简体中文、日语和韩语界面。
          - 支持白色/黑色/跟随系统主题配色。
          - 交互式备份管理，轻松创建和还原配置文件。
          - 新增 Steam URL 添加方式，可添加 `steam://launch/<AppID>/VR` 这类 Steam 游戏启动链接。
          - 改进手动添加 EXE 的自启动可靠性，通过轻量启动代理兼容更多普通程序。
          - 新增可选管理员身份启动，适合 UU 加速器等需要提权的程序。

          ### 下载说明
          - **便携版**：`SteamVR-Autostart-Manager.exe`（直接双击运行）
          - **安装版**：`SteamVR-Autostart-Manager-Setup.exe`（安装至系统，提供多国语言安装器）

          ### 开源协议
          - 本项目采用 MIT 开源协议。

          ---

          ## 🇯🇵 日本語

          ### 主な機能
          - `.vrmanifest` の登録と自動起動スイッチを直感的に管理する GUI。
          - 英語、中国語（簡体字）、日本語、韓国語をサポート。
          - ライト/ダーク/システムテーマの自動切り替えに対応。
          - 設定ファイルの作成と復元を簡単に行えるバックアップ管理機能。
          - `steam://launch/<AppID>/VR` のような Steam ゲーム URL の追加に対応。
          - 軽量ランチャーブリッジにより、手動追加した EXE の自動起動の信頼性を改善。
          - 管理者権限が必要なプログラム向けに、任意の管理者起動を追加。

          ### ダウンロード
          - **ポータブル版**: `SteamVR-Autostart-Manager.exe` (直接実行可能)
          - **インストーラー版**: `SteamVR-Autostart-Manager-Setup.exe` (システムにインストール)

          ### ライセンス
          - このプロジェクトは MIT ライセンスの下でライセンスされています。

          ---

          ## 🇰🇷 한국어

          ### 주요 기능
          - `.vrmanifest` 등록 및 자동 시작 상태를 직관적으로 관리하는 GUI.
          - 영어, 중국어(간체), 일본어, 한국어 인터페이스 지원.
          - 라이트/다크/시스템 테마 매칭 지원.
          - 설정 파일을 간편하게 백업하고 복원할 수 있는 백업 관리 기능.
          - `steam://launch/<AppID>/VR` 같은 Steam 게임 URL 추가를 지원합니다.
          - 가벼운 런처 브리지를 통해 수동으로 추가한 EXE의 자동 시작 안정성을 개선했습니다.
          - 관리자 권한이 필요한 프로그램을 위한 선택적 관리자 실행을 추가했습니다.

          ### 다운로드
          - **포터블 버전 (便携版)**: `SteamVR-Autostart-Manager.exe` (직접 실행)
          - **인스톨러 버전 (安装版)**: `SteamVR-Autostart-Manager-Setup.exe` (시스템 설치)

          ### 라이선스
          - 이 프로젝트는 MIT 라이선스에 따라 라이선스가 부여됩니다.
          '@ | Set-Content -Encoding UTF8 release-notes.md

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist\SteamVR-Autostart-Manager.exe" `
            "installer_output\SteamVR-Autostart-Manager-Setup.exe" `
            --title "${{ github.ref_name }}" `
            --notes-file release-notes.md `
            --verify-tag
